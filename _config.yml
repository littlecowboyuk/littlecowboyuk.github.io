# Site
name: '小牛仔的飛行時光'
description: '紀錄小牛仔家的旅遊、飛行與生活點滴'
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
baseurl: '' 
disqus: ''
email: 'littlecowboyuk@gmail.com'
mailchimp-list: ''

include: ["_pages"]
permalink: /:title/

# Plugins
plugins: 
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  
authors:
    sal:
      name:            小牛仔
      site:            
      avatar:          /assets/images/avatar1.jpg
      bio:             "分享旅遊與飛行體驗，在這裡紀錄小牛仔家的生活，歡迎來到我們的新家。"
      email:           littlecowboyuk@gmail.com
      twitter:         

# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: sal
      avatar: /assets/images/avatar1.jpg
      
  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page
      
# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 10

# Exclude metadata and development time dependencies (like Grunt plugins)
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]

# 確保 plugins 區塊內有 jekyll-sitemap
plugins:
  - jekyll-sitemap
